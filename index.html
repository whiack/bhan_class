<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教务管理综合平台</title>
<style>
:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --accent: #22c55e;
  --bg: #f0f2f5;
  --card: #fff;
  --fg: #1a1a2e;
  --muted: #f8f9fc;
  --muted-fg: #64748b;
  --border: #e8e8e8;
  --warning: #f59e0b;
  --danger: #ef4444;
  --sidebar-bg: #1e1b4b;
  --sidebar-hover: #312e81;
  --radius: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;padding:20px 0}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:4px 20px 24px}
.sidebar-logo .icon{width:34px;height:34px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.sidebar-logo .text{color:#fff;font-size:18px;font-weight:700}
.nav-label{padding:12px 20px 6px;font-size:10px;color:#818cf8;text-transform:uppercase;letter-spacing:1.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 10px;border-radius:8px;cursor:pointer;color:#c7d2fe;font-size:13px;transition:all .15s}
.nav-item:hover{background:var(--sidebar-hover);color:#e0e7ff}
.nav-item.active{background:var(--primary);color:#fff;font-weight:600}
.nav-item .dot{width:8px;height:8px;border-radius:50%;background:#818cf8}
.nav-item.active .dot{background:#fff}
.sidebar-user{margin-top:auto;padding:14px 20px;display:flex;align-items:center;gap:10px;border-top:1px solid #312e81}
.sidebar-user .avatar{width:30px;height:30px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}
.sidebar-user .name{color:#e0e7ff;font-size:13px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--card);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar .title{font-size:18px;font-weight:700;color:var(--fg)}
.topbar .date{font-size:12px;color:var(--muted-fg)}
.content{flex:1;overflow-y:auto;padding:16px}

/* Panels */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.panel-header h2{font-size:15px;font-weight:600}
.panel-header .count{font-size:12px;color:var(--muted-fg)}

/* Tabs */
.tab-row{display:flex;gap:4px;margin-bottom:12px;background:var(--card);border-radius:var(--radius);padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab-btn{padding:7px 18px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted-fg);transition:all .15s;font-family:inherit}
.tab-btn:hover{background:#f5f5f5}
.tab-btn.active{background:var(--primary);color:#fff}

/* Sub tabs */
.sub-tabs{display:flex;gap:6px;margin-left:12px}
.sub-tabs .tab-btn{padding:5px 14px;font-size:12px}

/* Toolbar */
.toolbar{padding:10px 16px;border-bottom:1px solid #f0f0f0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;outline:none;font-family:inherit}
.toolbar input:focus,.toolbar select:focus{border-color:var(--primary)}
.toolbar input{min-width:160px}

/* Buttons */
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#5558e6}
.btn-success{background:var(--accent);color:#fff}.btn-success:hover{background:#16a34a}
.btn-gray{background:#e5e7eb;color:#374151}.btn-gray:hover{background:#d1d5db}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-sm{padding:4px 10px;font-size:11px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--muted);padding:9px 8px;text-align:center;font-weight:600;color:#555;border-bottom:2px solid var(--border);white-space:nowrap;font-size:11px}
td{padding:6px 7px;border-bottom:1px solid #f5f5f5;text-align:center;vertical-align:middle}
tr:hover td{background:#fafaff}

/* Course cells */
.cell{cursor:pointer;border-radius:5px;min-width:68px;min-height:34px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s;padding:5px 7px;width:100%;text-align:center}
.cell:hover{filter:brightness(.95);transform:scale(1.02)}
.cell-none{color:#bbb;background:transparent}
.cell-doing{background:#dbeafe;color:#1e40af;font-weight:500}
.cell-done{background:#dcfce7;color:#166534;font-weight:500}
.cell-other{background:#f1f5f9;color:#64748b}

.name-cell{font-weight:600;min-width:70px;font-size:12px;cursor:pointer}
.name-cell.master{color:var(--primary)}
.name-cell:hover{text-decoration:underline}

/* Direction badges */
.dir-tag{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500;cursor:pointer}
.dir-美本{background:#fee2e2;color:#991b1b}
.dir-英本{background:#dbeafe;color:#1e40af}
.dir-美研{background:#fce7f3;color:#9d174d}
.dir-英研{background:#e0e7ff;color:#3730a3}
.dir-日本{background:#fef3c7;color:#92400e}
.dir-其他{background:#f1f5f9;color:#475569}
.dir-北欧{background:#e0f2fe;color:#0369a1}

/* Attendance */
.att-tag{padding:2px 8px;border-radius:8px;font-size:11px;cursor:pointer}
.att-yes{background:#dcfce7;color:#166534}
.att-no{background:#fee2e2;color:#991b1b}

/* Section label */
.section-label{padding:9px 16px;font-size:13px;font-weight:600;color:#555;background:#fafafa;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.section-label .dot{width:8px;height:8px;border-radius:50%}
.dot-blue{background:var(--primary)}.dot-green{background:var(--accent)}

/* Row actions */
.row-actions{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.add-row{padding:10px 16px;text-align:center}
.add-row button{padding:10px 24px;border:2px dashed #d1d5db;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:#999;transition:all .15s;font-family:inherit}
.add-row button:hover{border-color:var(--primary);color:var(--primary);background:#f5f3ff}

/* KPI slots */
.kpi-slot{border-radius:8px;padding:8px 6px;font-size:11px;cursor:pointer;transition:all .12s;min-height:68px}
.kpi-slot:hover{transform:scale(1.03);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.kpi-slot .slot-num{font-size:10px;color:#999;margin-bottom:3px}
.kpi-slot .slot-name{font-weight:600;font-size:12px;word-break:break-all}
.kpi-slot .slot-proj{color:#555;font-size:10px;margin-top:2px;word-break:break-all}
.kpi-slot .slot-status{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block;margin-top:4px}
.kpi-slot.empty{border:1px dashed #d1d5db;background:#fff;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px}

/* KPI status colors */
.kpi-等完成{background:#f1f5f9;border:1px solid #cbd5e1}.kpi-等完成 .slot-status{background:#e2e8f0;color:#475569}
.kpi-等排版{background:#fff7ed;border:1px solid #fed7aa}.kpi-等排版 .slot-status{background:#ffedd5;color:#c2410c}
.kpi-可以排{background:#eff6ff;border:1px solid #bfdbfe}.kpi-可以排 .slot-status{background:#dbeafe;color:#1d4ed8}
.kpi-差视频{background:#fef2f2;border:1px solid #fecaca}.kpi-差视频 .slot-status{background:#fee2e2;color:#dc2626}
.kpi-给教务{background:#f5f3ff;border:1px solid #ddd6fe}.kpi-给教务 .slot-status{background:#ede9fe;color:#7c3aed}
.kpi-已提交{background:#fffbeb;border:1px solid #fde68a}.kpi-已提交 .slot-status{background:#fef3c7;color:#92400e}
.kpi-过审了{background:#f0fdf4;border:1px solid #bbf7d0}.kpi-过审了 .slot-status{background:#dcfce7;color:#15803d}

/* Q summary */
.kpi-q-card{border:1px solid #e8e8e8;border-radius:10px;padding:14px;border-left:3px solid #ccc}

/* Schedule styles */
.schedule-table th{background:var(--primary);color:#fff;text-align:center;font-weight:600;font-size:12px}
.schedule-table th:first-child{background:#4338ca}
.schedule-table td{text-align:center;padding:8px 6px;cursor:pointer}
.schedule-table td:first-child{font-weight:700;color:var(--primary);background:#f5f3ff}
.student-tag{display:inline-block;background:#e0e7ff;color:var(--primary);padding:3px 9px;border-radius:14px;font-size:11px;font-weight:500;margin:2px;cursor:pointer;transition:all .12s}
.student-tag:hover{background:#c7d2fe}
.student-tag.special{background:#fee2e2;color:var(--danger)}
.student-tag.remove-btn:after{content:' ×';opacity:.5;font-weight:700}
.empty-cell{color:#d1d5db;font-size:12px}

/* Popover */
.pop-backdrop{position:fixed;inset:0;z-index:998;background:rgba(0,0,0,.15)}
.pop-popup{position:fixed;z-index:999;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);padding:16px}

/* Tab content visibility */
.tab-content{display:none}
.tab-content.active{display:block}

/* Quick add */
.quick-add{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.quick-add button{padding:4px 10px;border-radius:12px;border:1px solid #d1d5db;background:#fff;font-size:11px;cursor:pointer;color:var(--muted-fg);transition:all .12s;font-family:inherit}
.quick-add button:hover{background:#f5f3ff;color:var(--primary);border-color:var(--primary)}

/* ===== MOBILE: max-width 768px ===== */
@media (max-width:768px) {
  :root { --radius: 8px; }

  /* Body: stack vertically, allow scroll */
  body { display:block; height:auto; overflow:auto; padding-bottom:64px; }

  /* Sidebar → top bar */
  .sidebar {
    width:100%; min-width:100%; height:auto;
    flex-direction:row; align-items:center;
    padding:8px 12px; gap:12px;
    position:sticky; top:0; z-index:100;
  }
  .sidebar-logo { padding:0; }
  .sidebar-logo .text { font-size:15px; }
  .sidebar-logo .icon { width:28px; height:28px; font-size:13px; }
  .nav-label, .sidebar-div { display:none; }
  .nav-item { padding:6px 10px; margin:0; font-size:11px; white-space:nowrap; }
  .nav-item .dot { width:6px; height:6px; }
  .sidebar-user { display:none; }

  /* Scrollable nav on top */
  .sidebar { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .sidebar::-webkit-scrollbar { display:none; }

  /* Main area */
  .main { display:block; overflow:visible; }
  .topbar { height:44px; padding:0 12px; position:sticky; top:48px; z-index:99; }
  .topbar .title { font-size:15px; }
  .topbar .date { font-size:10px; }
  .topbar > div { gap:4px !important; flex-wrap:wrap; }
  .topbar > div .btn-sm { padding:3px 6px; font-size:10px; }
  #syncBadge { font-size:14px !important; }

  /* Tab bar scrollable */
  .tab-row { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 8px 8px; }
  .tab-row::-webkit-scrollbar { display:none; }
  .tab-btn { white-space:nowrap; font-size:12px; padding:6px 14px; }
  .tab-btn.active { font-size:12px; }

  /* Content */
  .content { padding:8px; overflow:visible; }
  #contentArea { overflow:visible; }

  /* Stats cards: 2 per row */
  .stats-row, #progressStats, #overviewStats {
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .stat-card { min-width:0; padding:12px; }
  .stat-card .value { font-size:24px; }
  .stat-card .label { font-size:11px; }

  /* KPI Q cards: 2 per row */
  #kpiRoot > div:first-child {
    grid-template-columns:1fr 1fr !important;
    gap:8px !important;
  }

  /* Tables: horizontal scroll */
  .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch;
    /* hide scrollbar */
    scrollbar-width:none; -ms-overflow-style:none;
  }
  .table-wrap::-webkit-scrollbar { display:none; }

  table { font-size:11px; min-width:700px; }
  th { padding:7px 5px; font-size:10px; }
  td { padding:5px 4px; }
  .cell { min-width:55px; min-height:30px; font-size:10px; padding:4px 5px; }
  .name-cell { font-size:11px; min-width:55px; }

  /* Panel tweaks */
  .panel { border-radius:var(--radius); margin-bottom:10px; }
  .panel-header { padding:10px 12px; }
  .panel-header h2 { font-size:14px; }
  .section-label { padding:7px 12px; font-size:12px; }

  /* Toolbar */
  .toolbar { padding:8px 12px; gap:6px; }
  .toolbar input { min-width:120px; font-size:12px; }
  .toolbar select { font-size:12px; }
  .sub-tabs { margin-left:0; margin-top:6px; }

  /* Row actions: wrap, bigger touch targets */
  .row-actions { gap:4px; }
  .btn-sm { padding:5px 8px; font-size:11px; }

  /* Direction badges */
  .dir-tag { font-size:10px; padding:2px 7px; }

  /* KPI grid: 4 columns on mobile */
  .kpi-grid { grid-template-columns:repeat(4,1fr) !important; }
  .kpi-slot { min-height:60px; padding:6px 4px; }
  .kpi-slot .slot-name { font-size:11px; }
  .kpi-slot .slot-proj { font-size:10px; }
  .kpi-slot .slot-status { font-size:9px; }
  .kpi-slot.empty { font-size:10px; }

  /* Schedule */
  .schedule-table { min-width:520px; }
  .schedule-table th { font-size:11px; padding:7px 4px; }
  .schedule-table td { padding:6px 3px; font-size:11px; }
  .student-tag { font-size:10px; padding:2px 7px; border-radius:10px; }
  .empty-cell { font-size:11px; }

  /* Quick add */
  .quick-add { gap:3px; }
  .quick-add button { font-size:10px; padding:3px 8px; border-radius:10px; }

  /* Add student row on schedule tab */
  #addStudentRow, [style*="flex-wrap:wrap"] { flex-direction:column; }
  #newStudName, #newStudTime, #newStudDay { width:100%; }

  /* Popover: full-width on mobile */
  .pop-popup { left:8px !important; right:8px; width:auto !important; max-width:calc(100vw - 16px); }
  .pop-popup > div { min-width:0 !important; }

  /* Buttons bigger on mobile */
  .btn { padding:8px 14px; font-size:13px; }
  .add-row button { font-size:14px; padding:12px 24px; }

  /* Schedule layout: stack on mobile */
  #tab-schedule > div[style*="display:flex"] { flex-direction:column; }
  #tab-schedule .panel { min-width:0 !important; }
}

/* ===== TABLET: 769px-1024px ===== */
@media (min-width:769px) and (max-width:1024px) {
  .sidebar { width:180px; min-width:180px; }
  .sidebar-logo .text { font-size:16px; }
  .nav-item { font-size:12px; padding:8px 12px; margin:1px 6px; }
  .stats-row, #progressStats, #overviewStats {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  #kpiRoot > div:first-child {
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr)) !important;
  }
  .cell { min-width:60px; font-size:10px; padding:4px 5px; }
}
</style>
<style>

.tab-btn.active{background:#fff;color:#0a84ff;box-shadow:0 8px 20px rgba(15,23,42,.08)}

.toolbar input:focus,.toolbar select:focus,#newStudName:focus,#newStudTime:focus,#newStudDay:focus{border-color:#0a84ff!important;box-shadow:0 0 0 4px rgba(10,132,255,.12);outline:none}

.btn-primary:hover{background:#0071e3}
.btn-success{background:#30d158;color:#052e16}
.btn-success:hover{background:#28c84f}
.btn-gray{background:#fff;color:#334155;border-color:rgba(148,163,184,.28)}
.btn-gray:hover{background:#f8fafc;border-color:rgba(10,132,255,.28);color:#0a84ff}

.menu-panel .btn{width:100%;justify-content:flex-start;text-align:left}
th{background:#f8fafc;border-bottom:var(--hairline);color:#64748b;font-weight:680}
td{border-bottom:1px solid rgba(226,232,240,.72)}
tr:hover td{background:#f8fbff}
.cell{border-radius:9px;transform:none!important}
.cell:hover{filter:none;box-shadow:0 0 0 3px rgba(10,132,255,.1)}
.cell-none{color:#b8c0cc}

.add-row{display:none}
.quick-add{display:none!important;background:rgba(255,255,255,.72);border:var(--hairline);border-radius:14px;padding:10px;margin-bottom:12px}
.quick-add button{border-radius:999px;background:#fff;border-color:rgba(148,163,184,.24)}

<script>
// ==================== DATA & STORAGE ====================
const COURSES = ['基础课1','基础课2','桌游项目','Unity项目','项目3','项目4'];
const STATUS_OPTIONS = ['none','doing','done','other'];
const STATUS_LABELS = {none:'未进行',doing:'进行中',done:'完成',other:'其他导师上'};
const DIR_OPTIONS = ['美本','英本','美研','英研','日本','其他','北欧'];
const TIME_SLOTS = ['9:30','10:30','13:00','14:00','15:00','16:00','17:00'];
const DAY_NAMES = ['周日','周一','周二','周三','周四'];

let uid = 200;
const DATA_VER = 9; // increment on each deploy to force refresh

function load(key, fallback) {
  const storedVer = localStorage.getItem('data_version');
  if (storedVer != DATA_VER) {
    // Version mismatch: use defaults, skip stale localStorage
    localStorage.setItem('data_version', DATA_VER);
    return (typeof fallback === 'function') ? fallback() : fallback;
  }
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : (typeof fallback === 'function' ? fallback() : fallback); }
  catch(e) { return (typeof fallback === 'function') ? fallback() : fallback; }
}
function save(key,v) { localStorage.setItem(key,JSON.stringify(v)); localStorage.setItem('data_version',DATA_VER); autoSyncToFile(); }

// ===== Auto-sync to local data.json (File System Access API) =====
let _syncHandle=null, _syncDirty=false;
function updateSyncBadge(){ const b=document.getElementById('syncBadge'); if(!b)return; b.textContent=_syncDirty?'●':'○'; b.style.color=_syncDirty?'#f59e0b':'#22c55e'; }
function updateBindUI(){ const b=document.getElementById('bindBtn'); if(!b)return; b.textContent=_syncHandle?'已绑定':'绑定JSON'; b.style.background=_syncHandle?'#dcfce7':''; b.style.color=_syncHandle?'#166534':''; }
function saveFileNow(){ if(!_syncHandle)return; _syncHandle.createWritable().then(w=>{const d={students,kpiData,schedule:schData,exportTime:new Date().toISOString()};w.write(JSON.stringify(d,null,2)).then(()=>{w.close();_syncDirty=false;updateSyncBadge()}).catch(()=>{})}).catch(()=>{_syncHandle=null;updateBindUI()}) }
function autoSyncToFile(){ _syncDirty=true; updateSyncBadge(); saveFileNow(); }

// Persist handle in IndexedDB so it survives page reloads
function storeHandle(h){ const r=indexedDB.open('sync_fs',1); r.onupgradeneeded=()=>r.result.createObjectStore('handles'); r.onsuccess=()=>{const t=r.result.transaction('handles','readwrite');t.objectStore('handles').put(h,'fh');t.oncomplete=()=>r.result.close()} }
async function restoreHandle(){ try{const ok=new Promise((res,rej)=>{const r=indexedDB.open('sync_fs',1);r.onsuccess=()=>{const t=r.result.transaction('handles','readonly');const g=t.objectStore('handles').get('fh');g.onsuccess=()=>{const h=g.result;r.result.close();if(h){h.queryPermission().then(p=>{if(p==='granted')res(h);else h.requestPermission().then(p2=>p2==='granted'?res(h):res(null))}).catch(()=>res(null))}else res(null)};g.onerror=()=>{r.result.close();res(null)}};r.onerror=()=>rej(null);r.onupgradeneeded=()=>{r.result.createObjectStore('handles')}});const h=await ok;if(h){_syncHandle=h;updateBindUI()} }catch(e){} }

async function bindSyncFile(){ if(!window.showOpenFilePicker){alert('绑定功能需要 Chrome/Edge，并且页面需运行在 https、localhost 或本地文件环境。在线分享时可用“下载备份/导入备份”。');return} try{const[h]=await window.showOpenFilePicker({types:[{description:'JSON Files',accept:{'application/json':['.json']}}],multiple:false});_syncHandle=h;storeHandle(h);saveFileNow();alert('绑定成功！以后打开自动连接，无需重新绑定。');updateBindUI()}catch(e){if(e.name!=='AbortError')alert('需要 Chrome/Edge 浏览器授权文件访问')} }
async function bindNewFile(){ if(!window.showSaveFilePicker){alert('绑定功能需要 Chrome/Edge，并且页面需运行在 https、localhost 或本地文件环境。在线分享时可用“下载备份/导入备份”。');return} try{const h=await window.showSaveFilePicker({suggestedName:'data.json',types:[{description:'JSON Files',accept:{'application/json':['.json']}}]});_syncHandle=h;storeHandle(h);saveFileNow();alert('绑定成功！以后打开自动连接，无需重新绑定。');updateBindUI()}catch(e){if(e.name!=='AbortError')alert('需要 Chrome/Edge 浏览器授权文件访问')} }
function unbindSync(){ _syncHandle=null; const r=indexedDB.open('sync_fs',1); r.onsuccess=()=>{r.result.transaction('handles','readwrite').objectStore('handles').delete('fh');r.result.close()}; updateBindUI(); alert('已解除绑定'); }

function copyShareLink(){
  const url = location.href;
  if(!url || url.startsWith('file:')) {
    alert('当前是本地文件地址，发给别人通常打不开。部署到公网后再点“复制链接”。');
    return;
  }
  navigator.clipboard?.writeText(url).then(()=>alert('链接已复制')).catch(()=>prompt('复制这个链接：', url));
}

function importAll(event){
  const file = event.target.files?.[0];
  event.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data.students) || !data.kpiData || !data.schedule) throw new Error('bad shape');
      if(!confirm('导入后会覆盖当前浏览器里的学生、KPI 和课表数据，确定继续？')) return;
      students = normalizeStudents(data.students).list;
      kpiData = data.kpiData;
      schData = data.schedule;
      schUndo = [];
      save('student_board_v2_merged', students);
      save('kpi_board_data_merged', kpiData);
      save('sch_merged', schData);
      save('sch_undo', schUndo);
      switchTab(load('activeTab','progress'));
      alert('导入完成');
    } catch(e) {
      alert('导入失败：请选择由本页面导出的完整 JSON 备份。');
    }
  };
  reader.readAsText(file, 'utf-8');
}

// ---- Student data ----
function defaultStudents() {
  const mk = (id,name,group,coming,master,vip,dir,cd,cmpl) => ({id,name,group,coming,master,vip,direction:dir,courses:Object.fromEntries(COURSES.map((c,i)=>{const d=cd[i]||{};return[c,{status:d.s||'none',text:d.t||''}]})),completed:cmpl||false});
  return [

function normalizeStudents(list){
  const keyMap = {'项目1':'桌游项目','项目2':'Unity项目'};
  let migrated = false;
  (list||[]).forEach(st=>{
    st.courses = st.courses || {};
    for(const [oldK,newK] of Object.entries(keyMap)){
      if(st.courses[oldK] && !st.courses[newK]) {
        st.courses[newK] = st.courses[oldK];
        migrated = true;
      }
      if(st.courses[oldK]) {
        delete st.courses[oldK];
        migrated = true;
      }
    }
    COURSES.forEach(c=>{
      if(!st.courses[c]) {
        st.courses[c] = {status:'none',text:''};
        migrated = true;
      }
    });
  });
  return {list:list||[], migrated};
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));

}

// ==================== STUDENT PROGRESS TAB ====================
function renderProgress() {
  const searchQ = (document.getElementById('stuSearch')?.value||'').toLowerCase();
  const dirQ = (document.getElementById('stuDir')?.value||'all');
  const groupQ = (document.getElementById('stuGroup')?.value||'all');

  let list = students.filter(s=>currentStudentSubTab==='active'?!s.completed:s.completed);
  if(searchQ) list=list.filter(s=>s.name.toLowerCase().includes(searchQ)||Object.values(s.courses||{}).some(c=>(c.text||'').toLowerCase().includes(searchQ)));
  if(dirQ!=='all') list=list.filter(s=>s.direction===dirQ);
  if(groupQ!=='all') list=list.filter(s=>s.group===groupQ);

  const groups = {}; list.forEach(s=>{if(!groups[s.group])groups[s.group]=[];groups[s.group].push(s)});
  const allGroups = [...new Set(students.map(s=>s.group))].sort();
  let html=`<div class="panel">
    <div class="panel-header">
      <h2>${currentStudentSubTab==='active'?'在读学生':'已完成学生'}</h2>
      <span class="count">${list.length} 人</span>
      <div class="sub-tabs">
        <button class="tab-btn ${currentStudentSubTab==='active'?'active':''}" onclick="setStudentSub('active')">在读</button>
        <button class="tab-btn ${currentStudentSubTab==='completed'?'active':''}" onclick="setStudentSub('completed')">已完成</button>
      </div>
    </div>
    <div class="toolbar">
      <input id="stuSearch" placeholder="搜索姓名或项目" oninput="renderProgress()" value="${searchQ||''}">
      <select id="stuDir" onchange="renderProgress()"><option value="all">全部方向</option>${DIR_OPTIONS.map(d=>`<option value="${d}" ${dirQ===d?'selected':''}>${d}</option>`).join('')}</select>
      <select id="stuGroup" onchange="renderProgress()"><option value="all">全部年级</option>${allGroups.map(g=>`<option value="${g}" ${groupQ===g?'selected':''}>${g}</option>`).join('')}</select>
      ${currentStudentSubTab==='active'?`<button class="btn btn-primary btn-sm" onclick="addStudent()">新增学生</button>`:''}
    </div>
    <div class="table-wrap"><table><thead><tr>
      <th style="width:40px">#</th><th>姓名</th><th>出勤</th>
      ${COURSES.map(c=>`<th>${c}</th>`).join('')}
      <th>VIP</th><th>申请方向</th><th>操作</th>
    </tr></thead><tbody>`;

  for(const [group,gl] of Object.entries(groups)) {
    html+=`<tr><td colspan="${10+COURSES.length}" class="section-label"><span class="dot ${currentStudentSubTab==='active'?'dot-blue':'dot-green'}"></span>${group} (${gl.length}人)</td></tr>`;
    gl.forEach(s=>{
      html+=`<tr>
        <td>${s.id}</td>
        <td class="name-cell${s.master?' master':''}" onclick="editStudentName(${s.id})">${s.name}</td>
        <td><span class="att-tag ${s.coming?'att-yes':'att-no'}" onclick="toggleComing(${s.id})">${s.coming?'✓':'✗不来'}</span></td>`;
      COURSES.forEach(c=>{
        const co=s.courses[c] || {status:'none',text:''};
        const note=co.text?`${c}：${STATUS_LABELS[co.status]} · ${co.text}`:`${c}：${STATUS_LABELS[co.status]}`;
        html+=`<td onclick="editCourse(${s.id},'${c}')" title="${esc(note)}"><span class="cell course-chip cell-${co.status}">${cellIcon(co.status)}</span></td>`;
      });
      html+=`<td onclick="editVip(${s.id})" style="cursor:pointer;font-size:12px;min-width:40px">${s.vip||'<span style="color:#ccc">-</span>'}</td>
        <td><span class="dir-tag dir-${s.direction||'其他'}" onclick="editDirection(${s.id})">${s.direction||'未设置'}</span></td>
        <td><div class="row-actions">
          ${currentStudentSubTab==='active'?`<button class="btn btn-success btn-sm" data-mobile="完" onclick="markComplete(${s.id})">完成</button>`:`<button class="btn btn-gray btn-sm" data-mobile="恢" onclick="markActive(${s.id})">恢复</button>`}
          <button class="btn btn-gray btn-sm" data-mobile="级" onclick="editGroup(${s.id})" title="改年级">年级</button>
          <button class="btn btn-gray btn-sm" data-mobile="${s.master?'主':'导'}" onclick="toggleMaster(${s.id})" title="主导师">${s.master?'主导师':'导师'}</button>
          <button class="btn btn-danger btn-sm" data-mobile="删" onclick="deleteStudent(${s.id})">删除</button>
        </div></td></tr>`;
    });
  }
  html+=`</tbody></table></div>`;
  html+=`</div>`;
  document.getElementById('studentRoot').innerHTML=html;
}

function cellIcon(s){return {none:'○',doing:'进',done:'✓',other:'他'}[s]||'○';}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function addStudent(){
  const grp=prompt('年级（如 26级、27级、28级）：','27级');if(!grp)return;
  const mid=Math.max(...students.map(s=>s.id),0)+1;
  students.push({id:mid,name:'新学生',group:grp,coming:true,master:false,vip:'',direction:'',
    courses:Object.fromEntries(COURSES.map(c=>[c,{status:'none',text:''}])),completed:false});
  save('student_board_v2_merged',students);
  renderProgress();setTimeout(()=>editStudentName(mid),200);
}

function deleteStudent(id){const s=students.find(x=>x.id===id);if(!s)return;if(!confirm(`确定删除「${s.name}」？不可撤销！`))return;students=students.filter(x=>x.id!==id);save('student_board_v2_merged',students);renderProgress();}

function editDirection(id){
  const s=students.find(x=>x.id===id);if(!s)return;
  const cont=document.createElement('div');
  cont.innerHTML=`<div style="background:#fff;border-radius:12px;padding:16px;min-width:180px"><p style="font-weight:600;margin-bottom:10px">申请方向</p>${DIR_OPTIONS.map(d=>`<button style="display:block;width:100%;margin:3px 0;padding:7px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;text-align:left" onmousedown="event.preventDefault()" onclick="setDirection(${id},'${d}')">${d}</button>`).join('')}<button style="display:block;width:100%;margin-top:8px;padding:7px;border:1px solid #e5e7eb;border-radius:6px;background:#f5f5f5;cursor:pointer;font-size:12px" onmousedown="event.preventDefault()" onclick="closePopover()">取消</button></div>`;
  showPopover(cont.firstElementChild);
}

function setDirection(id,dir){const s=students.find(x=>x.id===id);if(s){s.direction=dir;save('student_board_v2_merged',students);renderProgress();}closePopover();}

// Course editing
function editCourse(id,courseName){
  const s=students.find(x=>x.id===id);if(!s)return;const c=s.courses[courseName];
  const div=document.createElement('div');
  div.innerHTML=`<div onclick="event.stopPropagation()" style="min-width:220px" onmousedown="event.stopPropagation()">
    <div style="font-weight:600;margin-bottom:8px;font-size:12px">${s.name} · ${courseName}</div>
    <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px">
      ${STATUS_OPTIONS.map(st=>`<button style="padding:5px 9px;border:2px solid ${c.status===st?'#6366f1':'#e5e7eb'};border-radius:6px;background:${c.status===st?'#f5f3ff':'#fff'};cursor:pointer;font-size:11px;font-weight:${c.status===st?'600':'400'}" onmousedown="event.preventDefault()" onclick="setCourseStatus(${id},'${courseName}','${st}')">${STATUS_LABELS[st]}</button>`).join('')}
    </div>
    <input style="width:100%;padding:6px 8px;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;margin-bottom:8px" id="courseText" value="${c.text||''}" placeholder="项目名称/备注">
    <div style="display:flex;gap:6px;justify-content:flex-end">
      <button class="btn btn-gray btn-sm" onmousedown="event.preventDefault()" onclick="closePopover()">取消</button>
      <button class="btn btn-primary btn-sm" onmousedown="event.preventDefault()" onclick="saveCourseText(${id},'${courseName}')">确定</button>
    </div></div>`;
  showPopover(div.firstElementChild);
  setTimeout(()=>{const i=document.getElementById('courseText');if(i)i.focus()},100);
}

function setCourseStatus(id,courseName,status){
  const s=students.find(x=>x.id===id);if(!s||!s.courses[courseName])return;
  s.courses[courseName].status=status;save('student_board_v2_merged',students);
  closePopover();renderProgress();
  setTimeout(()=>editCourse(id,courseName),100);
}

function saveCourseText(id,courseName){
  const s=students.find(x=>x.id===id);if(!s)return;
  const inp=document.getElementById('courseText');s.courses[courseName].text=(inp?.value||'').trim();
  save('student_board_v2_merged',students);closePopover();renderProgress();
}

// ==================== POPOVER ====================
let popoverEl=null;
function showPopover(content){
  closePopover();
  const bd=document.createElement('div');bd.className='pop-backdrop';bd.onclick=closePopover;
  const pp=document.createElement('div');pp.className='pop-popup';pp.appendChild(content);
  document.body.appendChild(bd);document.body.appendChild(pp);
  const r=pp.getBoundingClientRect();
  pp.style.left=Math.max(10,(window.innerWidth-r.width)/2)+'px';
  pp.style.top=Math.max(10,(window.innerHeight-r.height)/2)+'px';
  popoverEl={bd,pp};
}
function closePopover(){if(popoverEl){popoverEl.bd.remove();popoverEl.pp.remove();popoverEl=null;}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopover();});

// ==================== KPI TAB ====================
function renderKpi(){
  let html='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:0 0 12px">';
  for(const [q,items] of Object.entries(kpiData)){
    const done=items.filter(i=>i.status==='过审了').length;
    const pct=Math.round(done/KPI_TARGET*100);
    const cls=done>=KPI_TARGET?'good':done>=5?'warn':'bad';
    const clr=cls==='good'?'#22c55e':cls==='warn'?'#f59e0b':'#ef4444';
    html+=`<div class="kpi-q-card" style="border-left-color:${clr}">
      <h4 style="font-size:13px;margin-bottom:4px">${KPI_Q_LABELS[q]}</h4>
      <div style="font-size:26px;font-weight:700;color:${clr}">${done}/${KPI_TARGET}</div>
      <div style="font-size:11px;color:#999">✅过审 ${done}  📋已填 ${items.length}</div>
      <div style="background:#f0f0f0;border-radius:6px;height:14px;margin-top:4px;overflow:hidden"><div style="height:100%;border-radius:6px;background:${clr};width:${Math.min(pct,100)}%"></div></div>
    </div>`;
  }
  html+='</div>';
  for(const [q,items] of Object.entries(kpiData)){
    const done=items.filter(i=>i.status==='过审了').length;
    html+=`<div class="panel" style="margin-bottom:12px"><div class="panel-header"><h2>${KPI_Q_LABELS[q]}</h2><span class="count">✅过审 ${done}/${KPI_TARGET}  📋已填 ${items.length}</span></div><div class="kpi-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:12px">`;
    for(let i=0;i<KPI_TARGET;i++){
      const item=items[i];
      if(item){
        html+=`<div class="kpi-slot kpi-${item.status}" onclick="editKpi('${q}',${i})"><div class="slot-num">#${i+1}</div><div class="slot-name">${item.name||'-'}</div><div class="slot-proj">${item.project||''}</div><div class="slot-status">${item.status}</div></div>`;
      }else{
        html+=`<div class="kpi-slot empty" onclick="editKpi('${q}',${i})"><span>＋ 空缺</span></div>`;
      }
    }
    html+='</div></div>';
  }
  document.getElementById('kpiRoot').innerHTML=html;
}

function editKpi(q,idx){
  while(kpiData[q].length<=idx)kpiData[q].push({name:'',project:'',status:'等完成'});
  const item=kpiData[q][idx];
  const div=document.createElement('div');
  div.innerHTML=`<div onclick="event.stopPropagation()" style="min-width:250px" onmousedown="event.stopPropagation()">
    <div style="font-weight:600;margin-bottom:8px;font-size:13px">编辑 #${idx+1}</div>
    <input style="width:100%;padding:7px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;margin-bottom:6px" id="kpiName" value="${item.name||''}" placeholder="学生姓名">
    <input style="width:100%;padding:7px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;margin-bottom:8px" id="kpiProj" value="${item.project||''}" placeholder="项目名称">
    <div style="font-size:11px;color:#999;margin-bottom:4px">状态：</div>
    <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">
      ${KPI_STATUSES.map(st=>`<button style="padding:5px 9px;border:2px solid ${item.status===st?'#6366f1':'#e5e7eb'};border-radius:6px;background:${item.status===st?'#f5f3ff':'#fff'};cursor:pointer;font-size:11px;font-weight:${item.status===st?'600':'400'}" onmousedown="event.preventDefault()" onclick="setKpiStatus('${q}',${idx},'${st}')">${st}</button>`).join('')}
    </div>
    <div style="display:flex;gap:6px;justify-content:flex-end">
      <button class="btn btn-danger btn-sm" onmousedown="event.preventDefault()" onclick="clearKpi('${q}',${idx})">清空</button>
      <button class="btn btn-gray btn-sm" onmousedown="event.preventDefault()" onclick="closePopover()">取消</button>
      <button class="btn btn-primary btn-sm" onmousedown="event.preventDefault()" onclick="saveKpi('${q}',${idx})">保存</button>
    </div></div>`;
  showPopover(div.firstElementChild);
  setTimeout(()=>{const i=document.getElementById('kpiName');if(i)i.focus()},100);
}

function setKpiStatus(q,idx,status){while(kpiData[q].length<=idx)kpiData[q].push({name:'',project:'',status:'等完成'});kpiData[q][idx].status=status;save('kpi_board_data_merged',kpiData);closePopover();renderKpi();setTimeout(()=>editKpi(q,idx),100);}
function saveKpi(q,idx){
  while(kpiData[q].length<=idx)kpiData[q].push({name:'',project:'',status:'等完成'});
  const ni=document.getElementById('kpiName'),pi=document.getElementById('kpiProj');
  kpiData[q][idx].name=(ni?.value||'').trim();kpiData[q][idx].project=(pi?.value||'').trim();
  save('kpi_board_data_merged',kpiData);closePopover();renderKpi();
}
function clearKpi(q,idx){kpiData[q].splice(idx,1);save('kpi_board_data_merged',kpiData);closePopover();renderKpi();}

// ==================== SCHEDULE TAB ====================
function renderSchedule(){
  const allN=[...new Set(students.filter(s=>!s.completed).map(s=>s.name).concat(Object.values(schData).flat(2)))];
  document.getElementById('quickAddBar').innerHTML=allN.map(s=>`<button onclick="schQuickPick('${s}')">+ ${s}</button>`).join('');
  document.getElementById('newStudTime').innerHTML='<option value="">时段</option>'+TIME_SLOTS.map(t=>`<option value="${t}">${t}</option>`).join('');

  let tbody='';TIME_SLOTS.forEach(time=>{
    tbody+=`<tr><td>${time}</td>${schData[time].map((arr,day)=>`<td onclick="schPrompt('${time}',${day})">${arr.length===0?'<span class="empty-cell">-</span>':arr.map(s=>{const sp=['usc 大师课','教研studio'].includes(s);return`<span class="student-tag ${sp?'special':'remove-btn'}" onclick="event.stopPropagation();schRemove('${time}',${day},'${s}')">${s}</span>`}).join(' ')}</td>`).join('')}</tr>`;
  });
  document.getElementById('schBody').innerHTML=tbody;
  renderSchStats();
}

function renderSchStats(){
  const all=Object.values(schData).flat(2);const tl=all.length;const empty=TIME_SLOTS.length*5-tl;
  const cnt={};all.forEach(s=>{if(!['usc 大师课','教研studio'].includes(s))cnt[s]=(cnt[s]||0)+1});
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  document.getElementById('schStats').innerHTML=`
    <div style="margin-bottom:8px"><span style="color:#999;font-size:11px">每周课时</span><div style="font-size:24px;font-weight:700;color:var(--primary)">${tl}</div></div>
    <div style="margin-bottom:8px"><span style="color:#999;font-size:11px">空闲时段</span><div style="font-size:24px;font-weight:700;color:var(--accent)">${empty}</div></div>
    <div style="font-weight:600;font-size:12px;color:#999;margin-bottom:6px">学生课时排行</div>
    ${sorted.map(([n,c])=>`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid #f5f5f5"><span>${n}</span><span style="color:#999">${c}节</span></div>`).join('')}`;
}

function schPrompt(time,day){const n=prompt(`在 ${DAY_NAMES[day]} ${time} 添加：`);if(n&&n.trim())addToSch(time,day,n.trim());}
function schQuickPick(name){if(schQuickAdd===name){schQuickAdd=null;return}schQuickAdd=name;alert(`已选中「${name}」，点击课表时段即可添加`)}
document.addEventListener('click',function(e){if(!schQuickAdd)return;const td=e.target.closest('td');if(!td)return;const tr=td.parentElement;if(!tr)return;const ti=Array.from(tr.parentElement.children).indexOf(tr);const di=Array.from(tr.children).indexOf(td)-1;if(ti>=0&&di>=0&&di<5){addToSch(TIME_SLOTS[ti],di,schQuickAdd);schQuickAdd=null;}});

function addToSch(time,day,name){
  if(schData[time][day].includes(name)){alert(`${name} 已在此时段有课！`);return}
  schUndo.push({time,day,removed:null,added:name});schData[time][day].push(name);
  save('sch_merged',schData);save('sch_undo',schUndo);renderSchedule();
}
function addStudentToSch(){const n=document.getElementById('newStudName').value.trim();const t=document.getElementById('newStudTime').value;const d=parseInt(document.getElementById('newStudDay').value);if(!n||!t){alert('请填写姓名并选择时段');return}addToSch(t,d,n);document.getElementById('newStudName').value='';}
function schRemove(time,day,name){if(!confirm(`移除 ${name}（${DAY_NAMES[day]} ${time}）？`))return;schUndo.push({time,day,removed:name,added:null});schData[time][day]=schData[time][day].filter(s=>s!==name);save('sch_merged',schData);save('sch_undo',schUndo);renderSchedule();}
function schUndoLast(){const last=schUndo.pop();if(!last){alert('无撤销操作');return}if(last.removed)schData[last.time][last.day].push(last.removed);if(last.added)schData[last.time][last.day]=schData[last.time][last.day].filter(s=>s!==last.added);save('sch_merged',schData);save('sch_undo',schUndo);renderSchedule();}
function schExport(){
  const all={students,kpiData,schedule:schData,exportTime:new Date().toISOString()};
  const j=JSON.stringify(all,null,2);
  const b=new Blob([j],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='教务数据完整备份.json';a.click();
}
function exportAll(){schExport();}
function schCopy(){let t='时间\t周日\t周一\t周二\t周三\t周四\n';TIME_SLOTS.forEach(ts=>{t+=ts+'\t'+schData[ts].map(a=>a.join(',')||'-').join('\t')+'\n'});navigator.clipboard.writeText(t).then(()=>alert('已复制'));}

// ==================== OVERVIEW TAB ====================
function renderOverview(){
  const active=students.filter(s=>!s.completed);
  const done=students.filter(s=>s.completed);
  const all=Object.values(schData).flat(2);const tl=all.length;const empty=TIME_SLOTS.length*5-tl;
  const totalDone=active.reduce((sum,s)=>sum+Object.values(s.courses).filter(c=>c.status==='done').length,0);
  const totalPoss=active.length*6;
  document.getElementById('overviewStats').innerHTML=`
    <div style="background:#fff;border-radius:8px;padding:14px;border:1px solid #e8e8e8"><div style="font-size:11px;color:#999">在读学生</div><div style="font-size:28px;font-weight:700">${active.length}</div></div>
    <div style="background:#fff;border-radius:8px;padding:14px;border:1px solid #e8e8e8"><div style="font-size:11px;color:#999">已完成</div><div style="font-size:28px;font-weight:700;color:var(--accent)">${done.length}</div></div>
    <div style="background:#fff;border-radius:8px;padding:14px;border:1px solid #e8e8e8"><div style="font-size:11px;color:#999">每周课时</div><div style="font-size:28px;font-weight:700;color:var(--primary)">${tl}</div></div>
    <div style="background:#fff;border-radius:8px;padding:14px;border:1px solid #e8e8e8"><div style="font-size:11px;color:#999">课程完成率</div><div style="font-size:28px;font-weight:700;color:var(--warning)">${Math.round(totalDone/totalPoss*100)}%</div></div>
  `;
  const cnt={};all.forEach(s=>{if(!['usc 大师课','教研studio'].includes(s))cnt[s]=(cnt[s]||0)+1});
  const sd=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const getDays=name=>{const ds=[];TIME_SLOTS.forEach(t=>{schData[t].forEach((arr,d)=>{if(arr.includes(name)&&!ds.includes(DAY_NAMES[d]))ds.push(DAY_NAMES[d])})});return ds.join('、')};
  document.getElementById('overviewBody').innerHTML=sd.map(([n,c])=>`<tr><td><strong>${n}</strong></td><td><span class="badge" style="background:#e0e7ff;color:var(--primary);padding:2px 10px;border-radius:10px;font-size:11px">${c} 节/周</span></td><td style="font-size:11px;color:#999">${getDays(n)}</td></tr>`).join('');
}

// ==================== INIT ====================
(function(){
  const now=new Date();const wd=['日','一','二','三','四','五','六'];
  document.getElementById('pageDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 周${wd[now.getDay()]}`;
  const savedTab=load('activeTab','progress');
  switchTab(savedTab);
  renderSchedule();renderKpi();
  restoreHandle(); // auto-restore previous file binding
})();
</script>
</body>
</html>
